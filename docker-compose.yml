services:
  ploidy:
    build: .
    ports:
      - "8765:8765"
    volumes:
      - ploidy-data:/data
    environment:
      PLOIDY_LOG_LEVEL: INFO
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8765/mcp')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  ploidy-data:
