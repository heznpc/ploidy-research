name: Build Paper PDFs

on:
  push:
    branches: [main]
    paths:
      - 'paper/**/*.tex'
      - 'paper/**/*.bib'
      - 'paper/**/*.sty'
      - 'paper/**/*.bst'
  pull_request:
    branches: [main]
    paths:
      - 'paper/**/*.tex'
      - 'paper/**/*.bib'
      - 'paper/**/*.sty'
      - 'paper/**/*.bst'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build paper/main.pdf (canonical)
        uses: xu-cheng/latex-action@v4
        with:
          root_file: main.tex
          working_directory: paper

      - name: Upload PDFs
        uses: actions/upload-artifact@v7
        with:
          name: paper-pdfs
          path: |
            paper/main.pdf
          retention-days: 30
